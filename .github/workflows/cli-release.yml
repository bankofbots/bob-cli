name: CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN_NAME="bob${{ matrix.ext }}"
          ARTIFACT_BASENAME="bob-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          ARTIFACT_DIR="dist/${ARTIFACT_BASENAME}"
          mkdir -p "${ARTIFACT_DIR}"
          go build -o "${ARTIFACT_DIR}/${BIN_NAME}" ./cli
          cp LICENSE "${ARTIFACT_DIR}/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${ARTIFACT_BASENAME}.zip" "${ARTIFACT_BASENAME}")
            echo "ASSET_PATH=dist/${ARTIFACT_BASENAME}.zip" >> "$GITHUB_ENV"
          else
            tar -C dist -czf "dist/${ARTIFACT_BASENAME}.tar.gz" "${ARTIFACT_BASENAME}"
            echo "ASSET_PATH=dist/${ARTIFACT_BASENAME}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Generate SHA256 checksum
        run: |
          sha256sum "$ASSET_PATH" > "$ASSET_PATH.sha256"
          echo "CHECKSUM_PATH=$ASSET_PATH.sha256" >> "$GITHUB_ENV"
        env:
          ASSET_PATH: ${{ env.ASSET_PATH }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}
